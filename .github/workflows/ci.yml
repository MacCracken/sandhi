name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version sync (VERSION ↔ src/version_str.cyr)
        # `src/version_str.cyr` is auto-generated from VERSION by
        # `scripts/version-bump.sh`. Re-running the script with the
        # current VERSION is the canonical regen-without-bump path:
        # if version_str.cyr drifted, `git diff` shows it and we fail.
        # Mirrors the cyrius repo's own pattern.
        run: |
          sh scripts/version-bump.sh "$(cat VERSION | tr -d '[:space:]')"
          if ! git diff --quiet src/version_str.cyr; then
            echo "ERROR: src/version_str.cyr is stale. Run 'scripts/version-bump.sh \"\$(cat VERSION)\"' and commit."
            git --no-pager diff src/version_str.cyr | head -20
            exit 1
          fi
          echo "version sync OK: $(cat VERSION | tr -d '[:space:]')"

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"* 2>/dev/null || true
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/bin"
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        # sandhi has only stdlib in [deps] — no external deps to lock —
        # so this is a no-op shape-check rather than a hash-pin verify.
        run: cyrius deps

      - name: Lint (src strict, tests/programs informational)
        # src/ is auto-discovered and warn-as-fail. One file is on the
        # allowlist: src/http/h2/huffman.cyr embeds the 2570-char HPACK
        # Appendix B table as a single string literal (one fixup, see
        # docs/architecture/001) — its line-length warning is by design.
        # tests/ and programs/ get an informational lint pass; they
        # can carry longer lines without gating CI.
        #
        # Buried-deferral gate: fail-mode since 1.4.3 (was report-mode).
        # cyrlint emits `deferral line N: untracked '<phrase>'` for any
        # `for now` / `out of scope` / `follow-up` / `not yet` /
        # `deferred` / `NOT_IMPLEMENTED` comment in src/ that isn't
        # cross-referenced to a CHANGELOG / issue / roadmap entry (or
        # marked `#skip-lint`). Those lines are sub-`warn`, so the
        # warn-grep below misses them — the dedicated deferral-grep
        # gates them now.
        run: |
          fail=0
          for f in src/*.cyr src/**/*.cyr; do
            [ -f "$f" ] || continue
            case "$f" in
              src/http/h2/huffman.cyr) echo "skip (allowlisted): $f"; continue ;;
            esac
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
            if echo "$out" | grep -qE 'deferral line [0-9]+: untracked'; then
              echo "untracked buried-deferral in $f — cross-reference a CHANGELOG/issue/roadmap entry or add #skip-lint"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint (src): warnings or untracked deferrals present"; exit 1; }
          echo "--- informational lint sweep (tests + programs) ---"
          for f in programs/*.cyr tests/*.tcyr; do
            [ -f "$f" ] || continue
            cyrius lint "$f" 2>&1 | tail -5
          done
          echo "--- end informational lint ---"

      - name: Format check
        # `cyrius fmt FILE --check` is silent and uses exit code 0
        # (clean) / 1 (drift) — earlier CI revisions tried to diff
        # the captured stdout against the file, but `--check` prints
        # nothing, so the diff always reported drift on every non-
        # empty file. Read the exit code directly.
        run: |
          fail=0
          for f in src/*.cyr src/**/*.cyr programs/*.cyr tests/*.tcyr; do
            [ -f "$f" ] || continue
            if ! cyrius fmt "$f" --check > /dev/null 2>&1; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Vet
        # vet src/main.cyr (the library entry) — `cyrius vet` audits
        # include dependencies. Catches missing/circular includes.
        run: cyrius vet src/main.cyr

      - name: Verify dist/sandhi.cyr is in sync with src/
        run: |
          cyrius distlib
          if ! git diff --quiet dist/sandhi.cyr; then
            echo "ERROR: dist/sandhi.cyr is stale. Run 'cyrius distlib' and commit the result."
            git --no-pager diff dist/sandhi.cyr | head -40
            exit 1
          fi
          echo "dist/sandhi.cyr matches src/"

      # TLS-backend flag convention (cyrius ≥ 6.1.21): native is the
      # no-flag default; `-D CYRIUS_TLS_LIBSSL` opts out to the deprecated
      # libssl bridge. (Legacy `-D CYRIUS_TLS_NATIVE` is a no-op alias.)
      - name: Build (DCE) — link proof against the library (native TLS)
        # `programs/smoke.cyr` is the canonical build target per
        # cyrius.cyml [build].entry. sandhi itself is a library; the
        # smoke program is what verifies all symbols link cleanly. Native
        # is the no-flag default (cyrius 6.1.21+), so this is the native
        # link proof.
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build programs/smoke.cyr build/sandhi-smoke
          echo "sandhi-smoke (native): $(wc -c < build/sandhi-smoke) bytes"

      - name: Build link proof — libssl path
        # The libssl bridge is a deprecated backend but must keep building.
        # `-D CYRIUS_TLS_LIBSSL` opts out to the libssl-only stack.
        run: |
          CYRIUS_DCE=1 cyrius build -D CYRIUS_TLS_LIBSSL programs/smoke.cyr build/sandhi-smoke-libssl
          echo "sandhi-smoke (libssl): $(wc -c < build/sandhi-smoke-libssl) bytes"

      - name: Verify ELF magic
        run: xxd -l 4 build/sandhi-smoke | grep -q "7f45 4c46"

      - name: Cross-build aarch64
        # Cyrius 2.1.1+ added native aarch64 support. Renamed
        # cc5_aarch64 → cycc_aarch64 at v6.0.0; back-compat symlink
        # ships through v6.0.x and drops at v6.1.0. Check the new
        # name first, fall back to the old name for v5.x snapshot
        # installs that might still be on PATH. Skip cleanly (the only
        # tolerated skip) if neither binary is present in the toolchain.
        #
        # RESOLVED (2026-06-14, cyrius 6.2.6 / sandhi 1.5.0): the
        # `cycc_aarch64` `error: unexpected enum` abort while assembling
        # stdlib `bayan` (filed 2026-06-12, reproduced on every toolchain
        # 6.0.21–6.2.1) is fixed upstream in 6.2.6. The cross-build now
        # produces a valid aarch64 ELF, so the step is a gating step
        # again — a build failure fails CI instead of warning-and-skipping.
        # See docs/issues/archive/2026-06-12-cyrius-aarch64-bayan-enum-parse.md
        # and docs/architecture/005-aarch64-bayan-cross-build.md.
        run: |
          rm -f build/sandhi-smoke-aarch64
          if [ -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            AARCH64_BIN=cycc_aarch64
          elif [ -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            AARCH64_BIN=cc5_aarch64
          else
            echo "::warning::cycc_aarch64 (nor cc5_aarch64) shipped with Cyrius $CYRIUS_VERSION — skipping aarch64 cross-build"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 programs/smoke.cyr build/sandhi-smoke-aarch64
          file build/sandhi-smoke-aarch64 | grep -q "aarch64" || {
            echo "ERROR: aarch64 build is not an aarch64 ELF"; exit 1; }
          echo "sandhi-smoke-aarch64: $(wc -c < build/sandhi-smoke-aarch64) bytes"

      - name: Test (core)
        run: cyrius test tests/sandhi.tcyr

      - name: Test (h2)
        run: cyrius test tests/h2.tcyr

      - name: Test (alloc)
        # Added at 1.1.0 (allocator-as-first-arg migration) but never
        # wired into CI until 1.2.8. Carries the per-request-arena
        # round-trip + OOM coverage for every `_a` variant.
        run: cyrius test tests/alloc.tcyr

      - name: Test (rpc)
        # Carved out of tests/sandhi.tcyr at 1.2.8 to relieve the
        # per-program-fixup-table cap (architecture/001). Covers the
        # JSON builder/extractor, RPC dispatch err-envelope extraction,
        # WebDriver URL helpers, and MCP envelope shape.
        run: cyrius test tests/rpc.tcyr

      - name: Live-network TLS-policy gate
        # 1.3.0: build + run programs/_policy_runtime_probe.cyr.
        # Mirrors cyrius `_tls_live_gate` skip-cleanly cascade —
        # exits 0 on PASS or clean SKIP (network unreachable / TLS
        # unavailable), non-zero on real regression (default-policy
        # handshake fail, wrong-pin not fail-closed, etc.).
        # Native is the no-flag default (cyrius 6.1.21+) — the gate
        # exercises the native backend, where pinning is enforced via the
        # backend-agnostic SPKI read and trust/mTLS fails closed (no SIGSEGV;
        # the pre-1.4.7 live crash). Informational gate: build runners may
        # have no network, in which case it skips → 0.
        run: |
          cyrius build programs/_policy_runtime_probe.cyr build/_policy_runtime_probe
          build/_policy_runtime_probe

      - name: Native HTTPS repeated-request gate (P1 regression)
        # 1.4.5: guards the repeated-request SIGSEGV (cyrius brk/fdlopen
        # contention). Native is the no-flag default (cyrius 6.1.21+) so no
        # libssl is loaded; N>=4 sequential
        # sandhi_http_get to one HTTPS host must complete crash-free. Targets
        # 1.1.1.1 (a host the native stack can handshake today; example.com-
        # class hosts await the upstream native-handshake gap). Skip-cleanly
        # when offline.
        run: |
          cyrius build programs/_https_native_loop_gate.cyr build/_https_native_loop_gate
          build/_https_native_loop_gate

      - name: High-level TLS-policy threading gate (1.4.6)
        # 1.4.6: a TLS policy attached to sandhi_http_options must be
        # enforced through the high-level sandhi_http_* path. Native is the
        # no-flag default (cyrius 6.1.21+) — the
        # SPKI-pin path is backend-agnostic since 1.4.2 and live-safe on
        # native (unlike the libssl-coupled trust-store/mTLS gates). Gates:
        # no-policy GET succeeds; wrong-pin GET fails closed (err=TLS); a pin
        # captured live from the peer SPKI succeeds. Skip-cleanly offline.
        run: |
          cyrius build programs/_https_policy_threading_gate.cyr build/_https_policy_threading_gate
          build/_https_policy_threading_gate

      - name: Server-side TLS gate (1.6.8)
        # 1.6.8: sandhi can now SERVE HTTPS (sandhi_server_run_pooled_tls + the
        # conn seam + conn-aware routing) on the native TLS stack. Forks a
        # pooled TLS server (Ed25519 test fixtures in programs/_tls_fixtures/)
        # and drives it with sandhi's OWN client over real TLS 1.3 handshakes:
        # a trust-store-anchored burst must 200+body, a default-policy client
        # must be REJECTED (cert verify not bypassed), and real requests must
        # still serve while a worker is pinned (pool isolation). Pure loopback
        # (no network); skips cleanly if TLS is unavailable or fixtures absent.
        run: |
          cyrius build programs/_server_tls_probe.cyr build/_server_tls_probe
          build/_server_tls_probe

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only — rejects patterns in `#` comments.
        # awk strip-and-check pattern matches yukti's CI shape.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # No raw exec/fork without explicit review — sandhi is a network
          # library, must never spawn subprocesses.
          scan "raw execve"   'syscall( *59'
          scan "raw fork"     'syscall( *57'
          scan "sys_system"   '\bsys_system\s*('
          # sandhi must never write to system paths — read-only is fine
          # (e.g. /etc/resolv.conf), but any string literal that looks
          # like a write target should get scrutiny.
          scan "writes to /etc"  '"/etc/[^r]'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64KB — force heap review).
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr src/**/*.cyr 2>/dev/null | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify VERSION appears in CHANGELOG
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "^## \[$VERSION\]" CHANGELOG.md \
            || { echo "FAIL: ## [$VERSION] section missing from CHANGELOG.md"; exit 1; }
          echo "CHANGELOG.md has section for $VERSION"
